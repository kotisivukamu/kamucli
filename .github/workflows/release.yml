name: release

# Release lane for the kamu CLI. This is a standalone public repo again
# (un-folded from the kamuhub monorepo, 2026-07-02), so releases run off plain
# `vX.Y.Z` tags — no `cli/` prefix, no version stripping, no workdir override.
# GoReleaser cross-compiles darwin/linux amd64+arm64, publishes the GitHub
# release, and pushes the Homebrew formula to kotisivukamu/homebrew-tap
# (HOMEBREW_TAP_TOKEN; skipped gracefully if unset).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
